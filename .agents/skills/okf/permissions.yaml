# Capability manifest, read by trust-card (capability layer) and any
# capability-based sandbox. Declares what this skill's shipped files do
# when run. Edits the agent makes while following the guidance are the
# agent's capability, not this artifact's.
model: executable
executes: true        # ships a read-only Node validator (okf-validate.mjs)
network: none
shell: false
filesystem_writes: false  # the validator only reads and reports
